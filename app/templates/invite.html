{% extends "base.html" %}
{% block title %}Invite · Concert Tracker{% endblock %}
{% block content %}
<div class="auth-wrap">
  <h1 class="auth-title">Invite Link</h1>
  <p class="auth-sub">Share this with someone you trust. It can only be used once.</p>
  <div class="invite-box">
    <code id="invite-url">{{ invite_url }}</code>
    <button class="btn btn-sm btn-accent" onclick="navigator.clipboard.writeText('{{ invite_url }}');this.textContent='Copied!'">Copy</button>
  </div>
  <p class="auth-footer">Code only: <strong>{{ invite_code }}</strong></p>
  <a href="/concert-tracker/shows" class="btn btn-ghost btn-full" style="margin-top:1rem">Back to Shows</a>
</div>
{% endblock %}
