{% extends "base.html" %}
{% block title %}Change Password · Concert Tracker{% endblock %}
{% block content %}
<div class="change-pw-wrap">
  <div class="page-header">
    <h1>Change Password</h1>
  </div>
  {% if error %}
  <div class="flash flash-error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/concert-tracker/profile/change-password" class="auth-form">
    <input type="hidden" name="_csrf" value="{{ csrf }}">
    <div class="form-group">
      <label for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password" required autocomplete="current-password">
    </div>
    <div class="form-group">
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-accent btn-full">Update Password</button>
  </form>
  <p style="margin-top:1rem;text-align:center">
    <a href="/concert-tracker/profile/edit" class="muted small">← Back to profile settings</a>
  </p>
</div>
{% endblock %}
