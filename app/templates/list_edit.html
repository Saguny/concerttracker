{% extends "base.html" %}
{% block title %}Edit {{ lst.title }} · Concert Tracker{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Edit List</h1>
</div>

<form method="post" action="/concert-tracker/lists/{{ lst.id }}/edit" class="show-form" style="max-width:540px">
  <input type="hidden" name="_csrf" value="{{ csrf }}">

  <div class="field-group">
    <label>Title <span class="required">*</span></label>
    <input type="text" name="title" value="{{ lst.title }}" maxlength="200" required>
  </div>

  <div class="field-group">
    <label>Description <span class="muted small">(optional)</span></label>
    <textarea name="description" rows="3" maxlength="1000">{{ lst.description or '' }}</textarea>
  </div>

  {% if lst.list_type == 'curated' %}
  <label class="checkbox-label" style="margin-bottom:1.25rem">
    <input type="checkbox" name="is_ranked" value="1" {% if lst.is_ranked %}checked{% endif %}>
    Ranked (show position numbers, enable drag-to-reorder)
  </label>
  {% endif %}

  {% if lst.list_type == 'smart' %}
  <div class="field-group">
    <label>Filter by</label>
    <select name="smart_type" id="smart-type" onchange="updateSmartValue()">
      <option value="year" {% if lst.smart_filter and lst.smart_filter.type == 'year' %}selected{% endif %}>Year</option>
      <option value="rating_min" {% if lst.smart_filter and lst.smart_filter.type == 'rating_min' %}selected{% endif %}>Minimum Rating</option>
      <option value="show_type" {% if lst.smart_filter and lst.smart_filter.type == 'show_type' %}selected{% endif %}>Show Type</option>
    </select>
  </div>
  <div class="field-group">
    <label>Value</label>
    <select name="smart_value" id="smart-value-year">
      {% for y in years %}
      <option value="{{ y }}" {% if lst.smart_filter and lst.smart_filter.type == 'year' and lst.smart_filter.value|string == y|string %}selected{% endif %}>{{ y }}</option>
      {% endfor %}
    </select>
    <select name="smart_value" id="smart-value-type" style="display:none">
      <option value="standalone" {% if lst.smart_filter and lst.smart_filter.value == 'standalone' %}selected{% endif %}>Standalone shows</option>
      <option value="festival" {% if lst.smart_filter and lst.smart_filter.value == 'festival' %}selected{% endif %}>Festivals only</option>
    </select>
    <select name="smart_value" id="smart-value-rating" style="display:none">
      {% for v in ['4.5', '4.0', '3.5', '3.0'] %}
      <option value="{{ v }}" {% if lst.smart_filter and lst.smart_filter.value|string == v %}selected{% endif %}>★ {{ v }}+</option>
      {% endfor %}
    </select>
  </div>
  <script>
  function updateSmartValue() {
    const t = document.getElementById('smart-type').value;
    document.getElementById('smart-value-year').style.display   = t === 'year'       ? '' : 'none';
    document.getElementById('smart-value-type').style.display   = t === 'show_type'  ? '' : 'none';
    document.getElementById('smart-value-rating').style.display = t === 'rating_min' ? '' : 'none';
    document.querySelectorAll('[name="smart_value"]').forEach(el => el.disabled = (el.style.display === 'none'));
  }
  updateSmartValue();
  document.getElementById('smart-type').addEventListener('change', updateSmartValue);
  </script>
  {% endif %}

  <div class="form-actions">
    <a href="/concert-tracker/lists/{{ lst.id }}" class="btn btn-ghost">Cancel</a>
    <button type="submit" class="btn btn-accent">Save</button>
  </div>
</form>
{% endblock %}
