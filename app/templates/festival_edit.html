{% extends "base.html" %}
{% block title %}Edit {{ festival_name }} · Concert Tracker{% endblock %}
{% block content %}
<div class="detail-wrap">
  <div class="page-header">
    <h1>{{ festival_name }}</h1>
    <a href="/concert-tracker/shows/festival/{{ festival_id }}" class="btn btn-ghost">Cancel</a>
  </div>
  <form method="post" action="/concert-tracker/shows/festival/{{ festival_id }}/edit" class="show-form">
    <input type="hidden" name="_csrf" value="{{ csrf }}">
    <div class="field-group">
      <label>Notes</label>
      <textarea name="festival_notes" rows="4" maxlength="2000" placeholder="How was it?">{{ festival_notes or '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-accent">Save</button>
    </div>
  </form>
</div>
{% endblock %}
