{% extends "base.html" %}
{% block title %}Edit {{ festival_name }} · Concert Tracker{% endblock %}
{% block content %}
<div class="page-header"><h1>Edit Festival</h1></div>

<form method="post" action="/concert-tracker/shows/festival/{{ festival_id }}/edit" class="show-form" id="festival-edit-form">
  <input type="hidden" name="_csrf" value="{{ csrf }}">
  <input type="hidden" name="artists_json" id="artists-json">

  <div class="field-group">
    <label>Festival Name <span class="required">*</span></label>
    <input type="text" name="festival_name" value="{{ festival_name }}" required maxlength="200">
  </div>

  <div class="form-row">
    <div class="field-group form-col">
      <label>City / Location</label>
      <input type="text" name="city" value="{{ city }}" maxlength="200" placeholder="e.g. Dessel, Belgium">
    </div>
  </div>

  <!-- Artists panel -->
  <div class="setlist-panel" id="artists-panel">
    <div class="setlist-header">
      <span>Artists seen <span id="artists-count" class="muted" style="font-weight:400;font-size:.8rem"></span></span>
    </div>
    <div id="artists-list" class="festival-artist-list"></div>
    <div class="tag-add-row" style="margin-top:.5rem">
      <div class="autocomplete-wrap" id="artist-ac-wrap" style="flex:1;position:relative">
        <input type="text" id="artist-search" autocomplete="off" placeholder="Add an artist…">
        <ul class="autocomplete-list" id="artist-ac-list"></ul>
      </div>
    </div>
  </div>

  <div class="field-group">
    <label>Notes</label>
    <textarea name="festival_notes" rows="4" maxlength="2000" placeholder="How was it?">{{ festival_notes or '' }}</textarea>
  </div>

  {% if taggable %}
  <div class="field-group">
    <label>Tag friends who were there</label>
    <select name="_tag_friend_id" id="tag-friend-select">
      <option value="">-none —</option>
      {% for f in taggable %}
      <option value="{{ f.id }}">{{ f.username }}</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}

  <div class="form-actions">
    <a href="/concert-tracker/shows/festival/{{ festival_id }}" class="btn btn-ghost">Cancel</a>
    <button type="submit" class="btn btn-accent" id="submit-btn">Save</button>
  </div>
</form>

<form method="post" action="/concert-tracker/shows/festival/{{ festival_id }}/delete"
      onsubmit="return confirm('Delete all {{ festival_name }} shows? This cannot be undone.')"
      style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)">
  <input type="hidden" name="_csrf" value="{{ csrf }}">
  <button type="submit" class="btn btn-danger">Delete Festival</button>
</form>
{% endblock %}

{% block scripts %}
<script>
const EXISTING = {{ existing_shows | tojson }};
// [{show_id, name, date, thumb}]
let artists = EXISTING.map(s => ({ show_id: s.show_id, name: s.name, date: s.date, thumb: s.thumb }));

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hideList(el) { el.style.display = 'none'; el.innerHTML = ''; }

function renderArtists() {
  const list  = document.getElementById('artists-list');
  const count = document.getElementById('artists-count');
  count.textContent = artists.length ? `-${artists.length} act${artists.length !== 1 ? 's' : ''}` : '';
  list.innerHTML = artists.map((a, i) => `
    <div class="festival-artist-row">
      ${a.thumb ? `<img src="${esc(a.thumb)}" class="festival-artist-thumb" alt="">` : '<div class="festival-artist-thumb-ph">🎵</div>'}
      <span class="festival-artist-name">${esc(a.name)}</span>
      <input type="date" class="artist-date festival-artist-date" data-i="${i}" value="${esc(a.date)}">
      <button type="button" class="btn-icon-danger festival-remove" data-i="${i}" title="Remove">×</button>
    </div>`).join('');

  list.querySelectorAll('.artist-date').forEach(inp => {
    inp.addEventListener('change', () => { artists[Number(inp.dataset.i)].date = inp.value; });
  });
  list.querySelectorAll('.festival-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      artists.splice(Number(btn.dataset.i), 1);
      renderArtists();
    });
  });
}

// Artist autocomplete
const artistSearch = document.getElementById('artist-search');
const artistAcList = document.getElementById('artist-ac-list');
let acDebounce;

artistSearch.addEventListener('input', () => {
  clearTimeout(acDebounce);
  const q = artistSearch.value.trim();
  if (q.length < 2) { hideList(artistAcList); return; }
  acDebounce = setTimeout(() => fetchArtists(q), 280);
});
artistSearch.addEventListener('keydown', e => { if (e.key === 'Escape') hideList(artistAcList); });
document.addEventListener('click', e => {
  if (!e.target.closest('#artist-ac-wrap')) hideList(artistAcList);
});

async function fetchArtists(q) {
  try {
    const res = await fetch(`/concert-tracker/api/artist-search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!data.length) { hideList(artistAcList); return; }
    artistAcList.innerHTML = data.map(a => `
      <li class="ac-item" data-name="${esc(a.name)}" data-thumb="${esc(a.thumb_url||'')}">
        ${a.thumb_url ? `<img src="${esc(a.thumb_url)}" class="ac-thumb">` : '<div class="ac-thumb ac-thumb-ph">🎵</div>'}
        <div class="ac-info">
          <div class="ac-name">${esc(a.name)}</div>
          ${a.genres && a.genres.length ? `<div class="ac-meta">${esc(a.genres.slice(0,2).join(' · '))}</div>` : ''}
        </div>
      </li>`).join('');
    artistAcList.style.display = 'block';
    artistAcList.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        addArtist(el.dataset.name, el.dataset.thumb);
      });
    });
  } catch {}
}

function addArtist(name, thumb) {
  if (artists.find(a => a.name.toLowerCase() === name.toLowerCase())) {
    artistSearch.value = ''; hideList(artistAcList); return;
  }
  const today = new Date().toISOString().slice(0,10);
  const lastDate = artists.length ? artists[artists.length - 1].date : today;
  artists.push({ show_id: null, name, thumb, date: lastDate });
  artistSearch.value = '';
  hideList(artistAcList);
  renderArtists();
}

document.getElementById('festival-edit-form').addEventListener('submit', e => {
  document.getElementById('artists-json').value = JSON.stringify(artists);
});

renderArtists();
</script>
{% endblock %}
